<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Audio player</title>

    <style type="text/css">
      :root {
        color-scheme: light dark;
      }

      #container {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 66%;
      }
    </style>

    <script type="text/javascript">
      class App {
        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          cfg.play = "play" in cfg;

          return [path, cfg];
        }

        static loadHash() {
          const [path, cfg] = this.parseHash();

          const container = document.getElementById("container");
          const source = container.children[0];

          if (path === "") source.removeAttribute("src");
          else source.src = path;

          container.load();

          if (cfg.play && navigator.userActivation.hasBeenActive)
            container.play();
        }
      }
    </script>
  </head>

  <body onload="App.loadHash()" onhashchange="App.loadHash()">
    <audio controls id="container" autofocus>
      <source />
      Your browser does not support the HTML5 audio element
    </audio>
  </body>
</html>
