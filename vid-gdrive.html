<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Video player</title>

    <style type="text/css">
      :root {
        color-scheme: light dark;
      }

      body {
        background-color: #000;
        color: #aaa;
      }

      #container {
        margin: 0px;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: 100%;
      }
    </style>

    <script type="text/javascript">
      class App {
        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          cfg.play = "play" in cfg;

          return [path, cfg];
        }

        static loadHash() {
          const [id, cfg] = this.parseHash();

          const container = document.getElementById("container");
          const source = container.children[0];

          if (id === "") source.removeAttribute("src");
          else source.src = "https://drive.google.com/uc?id=" + id;

          container.load();

          if (cfg.play) container.play();
        }
      }
    </script>
  </head>

  <body onload="App.loadHash()" onhashchange="App.loadHash()">
    <video controls id="container">
      <source />
      Your browser does not support the HTML5 video element
    </video>
  </body>
</html>
