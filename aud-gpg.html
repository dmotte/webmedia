<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Audio player</title>

    <style type="text/css">
      :root {
        color-scheme: light dark;

        --input-bg: #eee;
        --input-text: #000;
        --input-border: #888;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --input-bg: #000;
          --input-text: #ccc;
          --input-border: #888;
        }
      }

      body,
      td,
      th {
        font-family: sans-serif;
      }

      #dialogMsg::backdrop {
        background-color: #1118;
        backdrop-filter: blur(3px);
      }

      input {
        background-color: var(--input-bg);
        color: var(--input-text);
        border: 1px solid var(--input-border);
        padding: 10px;
        font-size: 16px;
      }

      #container {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 66%;
      }

      #dialogPsw {
        width: 50%;
      }
      #dialogPsw::backdrop {
        background-color: #1118;
        backdrop-filter: blur(3px);
      }
      #pswMain {
        width: calc(100% - 55px);
        box-sizing: border-box;
      }
      #btnLoad {
        width: 50px;
        font-weight: bold;
      }
    </style>

    <script
      type="text/javascript"
      src="https://unpkg.com/openpgp@6.3.0/dist/openpgp.min.js"
      integrity="sha384-Z5tStPoeClmuLPd1gAwdTCU53WcAkUjBNw7mEEvrQumVuNqEl52A9Nx5IhFdKE/c"
      crossorigin="anonymous"
    ></script>

    <script type="text/javascript">
      class App {
        static showModalMsg(msg = "") {
          const dialogMsg = document.getElementById("dialogMsg");

          if (msg === "") {
            dialogMsg.close();
            return;
          }

          dialogMsg.textContent = msg;
          dialogMsg.showModal();
        }

        ////////////////////////////////////////////////////////////////////////

        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          cfg.play = "play" in cfg;

          return [path, cfg];
        }

        ////////////////////////////////////////////////////////////////////////

        static loadHash() {
          const [path, cfg] = this.parseHash();

          const dialogPsw = document.getElementById("dialogPsw");
          const psw = document.getElementById("pswMain").value;
          if (psw === "") {
            dialogPsw.showModal();
            return;
          }
          dialogPsw.close();

          const container = document.getElementById("container");
          const source = container.children[0];

          const oldURL = source.src;
          source.removeAttribute("src");
          container.load();
          if (oldURL) URL.revokeObjectURL(oldURL);

          if (path === "") return;

          this.showModalMsg("Downloading media...");

          (async () => {
            const response = await fetch(path);
            if (!response.ok) throw new Error("HTTP error " + response.status);

            this.showModalMsg("Decrypting media...");

            const encryptedMessage = await openpgp.readMessage({
              binaryMessage: response.body,
            });

            const { data: decrypted } = await openpgp.decrypt({
              message: encryptedMessage,
              passwords: [psw],
              format: "binary",
            });

            const chunks = [],
              reader = decrypted.getReader();
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
            }

            const blob = new Blob(chunks, { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);

            source.src = url;
            container.load();

            if (cfg.play && navigator.userActivation.hasBeenActive) {
              this.showModalMsg("Starting playback...");
              await container.play();
            }

            this.showModalMsg();
          })();
        }

        ////////////////////////////////////////////////////////////////////////

        static body_onload() {
          window.addEventListener("error", (event) => {
            this.showModalMsg(`ERROR: ${event.error}`);
          });

          window.addEventListener("unhandledrejection", (event) => {
            this.showModalMsg(`ERROR: ${event.reason}`);
          });

          this.loadHash();
        }
      }
    </script>
  </head>

  <body onload="App.body_onload()" onhashchange="App.loadHash()">
    <audio
      controls
      id="container"
      controlsList="nodownload noremoteplayback"
      oncontextmenu="return false;"
    >
      <source />
      Your browser does not support the HTML5 audio element
    </audio>

    <dialog id="dialogPsw" closedby="none">
      <input
        type="password"
        id="pswMain"
        placeholder="Password"
        autofocus
        onkeydown="if (event.key === 'Enter') btnLoad.click();"
      />
      <input type="button" id="btnLoad" value="OK" onclick="App.loadHash()" />
    </dialog>

    <dialog id="dialogMsg" closedby="none"></dialog>
  </body>
</html>
