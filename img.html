<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Image viewer</title>

    <style type="text/css">
      #container {
        margin: 0px;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: 100%;
        background-color: #000;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center center;
      }
    </style>

    <script type="text/javascript">
      class App {
        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          return [path, cfg];
        }

        static loadHash() {
          const [path, cfg] = this.parseHash();

          const container = document.getElementById("container");
          container.style.backgroundImage = "url(" + path + ")";
        }
      }
    </script>
  </head>

  <body onload="App.loadHash()" onhashchange="App.loadHash()">
    <div id="container"></div>
  </body>
</html>
