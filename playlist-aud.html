<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Audio playlist player</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />

    <style type="text/css">
      :root {
        color-scheme: light dark;

        --lower-bg: #eee;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --lower-bg: #000;
        }
      }

      body,
      td,
      th {
        font-family: sans-serif;
      }

      #dialogMsg::backdrop {
        background-color: #1118;
        backdrop-filter: blur(3px);
      }

      .font-monospace {
        font-family: monospace;
      }
      .font-bold {
        font-weight: bold;
      }

      .cursor-pointer {
        cursor: pointer;
      }

      .select-none {
        user-select: none;
      }

      .color-grey {
        color: #888;
      }

      #divUpperOut {
        margin: 0px;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: calc(100% - 85px);

        overflow-y: scroll;
      }
      #divUpperIn {
        margin: 10px;
      }

      #divLowerOut {
        margin: 0px;
        position: absolute;
        left: 0px;
        bottom: 0px;
        width: 100%;
        height: 85px;

        background-color: var(--lower-bg);
      }
      #divLowerIn {
        margin: 10px;
      }

      #divLower1 {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
      }
      #divLower2 {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #spanTimeCurrent {
        position: absolute;
        left: 0;
      }
      #spanTimeDuration {
        position: absolute;
        right: 0;
      }
    </style>

    <script type="text/javascript">
      // Src: https://github.com/dmotte/misc/tree/main/snippets
      /** Fisher-Yates (Knuth) shuffle algorithm */
      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      class MediaQueue {
        constructor(items, currentIndex = null) {
          if (items.length < 0) throw new Error("The list is empty");

          this.items = items;

          this.setCurrent(currentIndex);

          this.setupShuffle();
        }

        /** Initializes (or re-initializes) the shuffle maps */
        setupShuffle() {
          const len = this.items.length;

          this.mapShufPrev = new Array(len);
          this.mapShufNext = new Array(len);

          // Build a single-cycle permutation of the items in mapShufNext,
          // and its inverse permutation in mapShufPrev

          const shuf = shuffle([...Array(len).keys()]);

          for (let i = 0; i < len - 1; i++) {
            this.mapShufNext[shuf[i]] = shuf[i + 1];
            this.mapShufPrev[shuf[i + 1]] = shuf[i];
          }
          this.mapShufNext[shuf[len - 1]] = shuf[0];
          this.mapShufPrev[shuf[0]] = shuf[len - 1];
        }

        getItems() {
          return this.items;
        }
        getLength() {
          return this.items.length;
        }
        getItem(index) {
          return this.items[index];
        }

        getCurrentIndex() {
          return this.currentIndex;
        }
        getCurrentItem() {
          if (this.currentIndex === null) return null;

          return this.items[this.currentIndex];
        }

        setCurrent(index) {
          if (index === null) {
            this.currentIndex = null;
            return;
          }

          if (index < 0) throw new Error("Index cannot be < 0");
          if (index >= this.items.length)
            throw new Error("Index cannot be >= number of items");

          this.currentIndex = index;
        }

        getPrevIndex(shuffle = false, loop = false) {
          if (this.currentIndex === null) return null;

          if (shuffle) return this.mapShufPrev[this.currentIndex];

          const len = this.items.length;

          if (!loop && this.currentIndex === 0) return null;

          return (this.currentIndex + len - 1) % len;
        }
        getNextIndex(shuffle = false, loop = false) {
          if (this.currentIndex === null) return null;

          if (shuffle) return this.mapShufNext[this.currentIndex];

          const len = this.items.length;

          if (!loop && this.currentIndex === len - 1) return null;

          return (this.currentIndex + 1) % len;
        }
      }

      // Src: https://github.com/dmotte/misc/tree/main/snippets
      function xmlescape(x) {
        return x
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&apos;");
      }

      // Src: https://github.com/dmotte/misc/tree/main/snippets
      function formatDuration(sec) {
        if (!isFinite(sec)) return "";

        const sign = sec < 0 ? "-" : "",
          absSec = Math.abs(sec);

        const h = Math.floor(absSec / 3600),
          m = Math.floor((absSec / 60) % 60),
          s = Math.floor(absSec % 60);

        return (
          sign +
          (h > 0 ? `${h}:` : "") +
          String(m).padStart(2, "0") +
          ":" +
          String(s).padStart(2, "0")
        );
      }

      class App {
        static showModalMsg(msg = "") {
          const dialogMsg = document.getElementById("dialogMsg");

          if (msg === "") {
            dialogMsg.close();
            return;
          }

          dialogMsg.textContent = msg;
          dialogMsg.showModal();
        }

        ////////////////////////////////////////////////////////////////////////

        static parseM3UPlaylist(text = "") {
          let playlistTitle = "",
            items = [];

          let itemTitle = "";
          for (const line of text.split(/\r?\n/u)) {
            if (line === "") continue;

            if (line.startsWith("#")) {
              if (line.startsWith("#EXTINF:")) {
                itemTitle = line.split(",").slice(1).join(",");
                continue;
              }

              if (line.startsWith("#PLAYLIST:")) {
                playlistTitle = line.substring(10);
                continue;
              }

              continue;
            }

            items.push({ title: itemTitle, url: line });
          }

          return [playlistTitle, items];
        }

        ////////////////////////////////////////////////////////////////////////

        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          cfg.shuffle = cfg.shuffle === "y";
          if (!["off", "all", "one"].includes(cfg.repeat)) cfg.repeat = "off";

          cfg.item = parseInt(cfg.item ?? "-1", 10);
          cfg.play = "play" in cfg;

          return [path, cfg];
        }

        ////////////////////////////////////////////////////////////////////////

        static playlistTitle = "Audio playlist player";

        static mediaQueue = null;

        static shuffleEnabled = false;
        static repeatMode = "off"; // Possible values: "off", "all", "one"

        ////////////////////////////////////////////////////////////////////////

        static updatePlaybackStatus() {
          const container = document.getElementById("container"),
            btnPlayPause = document.getElementById("btnPlayPause");

          if (container.paused) {
            btnPlayPause.textContent = "play_arrow";
            btnPlayPause.title = "Play";
          } else {
            btnPlayPause.textContent = "pause";
            btnPlayPause.title = "Pause";
          }
        }

        static setShuffleEnabled(x) {
          this.shuffleEnabled = x;

          // If we just disabled the shuffle mode, re-initialize the
          // shuffle maps for the next time
          if (!this.shuffleEnabled) this.mediaQueue.setupShuffle();

          const btnShuffle = document.getElementById("btnShuffle");
          btnShuffle.classList.toggle("color-grey", !this.shuffleEnabled);
        }

        static setRepeatMode(x) {
          if (!["off", "all", "one"].includes(x))
            throw new Error("Invalid repeat mode " + x);

          this.repeatMode = x;

          const btnRepeat = document.getElementById("btnRepeat");
          btnRepeat.textContent = x === "one" ? "repeat_one" : "repeat";
          btnRepeat.classList.toggle("color-grey", x === "off");
        }

        ////////////////////////////////////////////////////////////////////////

        static loadCurrentItem(play = false) {
          const container = document.getElementById("container");
          const source = container.children[0];

          const tbody = document.getElementById("tblList").tBodies[0];

          const currentItem = this.mediaQueue?.getCurrentItem() ?? null;

          if (currentItem === null) {
            container.currentTime = 0;
            source.removeAttribute("src");
            container.load();

            document.title = this.playlistTitle;

            this.updatePlaybackStatus();

            document.getElementById("rangeSeek").max = 0;
            document.getElementById("spanTimeDuration").textContent = "--:--";

            for (const row of tbody.rows) row.classList.remove("font-bold");

            return Promise.resolve();
          } else {
            container.currentTime = 0;
            source.src = currentItem.url;
            container.load();

            document.title = currentItem.title;

            this.updatePlaybackStatus();

            // Note: in this case the rangeSeek.max and
            // spanTimeDuration.textContent update will take place in the
            // container_onloadedmetadata event handler

            const strCurrentIndex = String(this.mediaQueue.getCurrentIndex());
            for (const row of tbody.rows)
              row.classList.toggle(
                "font-bold",
                row.dataset.index === strCurrentIndex,
              );

            return play && navigator.userActivation.hasBeenActive
              ? container.play()
              : Promise.resolve();
          }
        }

        ////////////////////////////////////////////////////////////////////////

        static body_onload() {
          window.addEventListener("error", (event) => {
            this.showModalMsg(`ERROR: ${event.error}`);
          });

          window.addEventListener("unhandledrejection", (event) => {
            this.showModalMsg(`ERROR: ${event.reason}`);
          });

          //////////////////////////////////////////////////////////////////////

          if ("mediaSession" in navigator) {
            navigator.mediaSession.setActionHandler("previoustrack", () => {
              const dialogMsg = document.getElementById("dialogMsg");
              if (dialogMsg.open) return;

              document.getElementById("btnPrev").click();
            });

            navigator.mediaSession.setActionHandler("nexttrack", () => {
              const dialogMsg = document.getElementById("dialogMsg");
              if (dialogMsg.open) return;

              document.getElementById("btnNext").click();
            });
          }

          //////////////////////////////////////////////////////////////////////

          const [path, cfg] = this.parseHash();

          this.showModalMsg("Loading playlist...");

          (async () => {
            const response = await fetch(path);
            if (!response.ok) throw new Error("HTTP error " + response.status);
            const responseText = await response.text();
            let [playlistTitle, items] = this.parseM3UPlaylist(responseText);

            playlistTitle ||= this.playlistTitle;
            this.playlistTitle = playlistTitle;
            document.getElementById("titleMain").textContent = playlistTitle;

            this.mediaQueue = new MediaQueue(items);

            const tbody = document.getElementById("tblList").tBodies[0];

            let tbodyHTML = "";
            for (const i in items) {
              const escItemTitle = xmlescape(items[i].title);

              tbodyHTML += `
                <tr class="cursor-pointer" title="${escItemTitle}"
                  data-index="${i}"
                  onclick="App.trItem_onclick(this)">
                  <td>
                    <span class="material-symbols-outlined">music_note</span>
                  </td>
                  <td>${escItemTitle}</td>
                </tr>
              `;
            }
            tbody.innerHTML = tbodyHTML;

            this.setShuffleEnabled(cfg.shuffle);
            this.setRepeatMode(cfg.repeat);

            if (cfg.item >= 0) this.mediaQueue.setCurrent(cfg.item);

            await this.loadCurrentItem(cfg.play);

            this.showModalMsg();
          })();
        }

        static body_onkeydown(event) {
          const dialogMsg = document.getElementById("dialogMsg");

          if (dialogMsg.open) return;

          const btnPlayPause = document.getElementById("btnPlayPause"),
            btnPrev = document.getElementById("btnPrev"),
            btnNext = document.getElementById("btnNext"),
            btnJumpBck = document.getElementById("btnJumpBck"),
            btnJumpFwd = document.getElementById("btnJumpFwd");

          switch (event.key) {
            case " ":
              btnPlayPause.click();
              break;
            case "ArrowUp":
              btnPrev.click();
              break;
            case "ArrowDown":
              btnNext.click();
              break;
            case "ArrowLeft":
              btnJumpBck.click();
              break;
            case "ArrowRight":
              btnJumpFwd.click();
              break;
          }
        }

        static trItem_onclick(elem) {
          this.mediaQueue.setCurrent(parseInt(elem.dataset.index, 10));

          this.showModalMsg("Starting playback...");
          this.loadCurrentItem(true).then(() => this.showModalMsg());
        }

        static btnPlayPause_onclick() {
          if (this.mediaQueue.getCurrentIndex() === null) {
            this.mediaQueue.setCurrent(0);

            this.showModalMsg("Starting playback...");
            this.loadCurrentItem(true).then(() => this.showModalMsg());
            return;
          }

          const container = document.getElementById("container");

          if (container.paused) {
            this.showModalMsg("Starting playback...");
            container.play().then(() => this.showModalMsg());
          } else container.pause();
        }

        static btnPrev_onclick() {
          const container = document.getElementById("container");

          if (container.currentTime > 3) {
            container.currentTime = 0;
            return;
          }

          this.mediaQueue.setCurrent(
            this.mediaQueue.getPrevIndex(
              this.shuffleEnabled,
              this.repeatMode === "all",
            ),
          );

          this.showModalMsg("Starting playback...");
          this.loadCurrentItem(true).then(() => this.showModalMsg());
        }

        static btnNext_onclick() {
          this.mediaQueue.setCurrent(
            this.mediaQueue.getNextIndex(
              this.shuffleEnabled,
              this.repeatMode === "all",
            ),
          );

          this.showModalMsg("Starting playback...");
          this.loadCurrentItem(true).then(() => this.showModalMsg());
        }

        static btnShuffle_onclick() {
          this.setShuffleEnabled(!this.shuffleEnabled);
        }

        static btnRepeat_onclick() {
          this.setRepeatMode(
            { off: "all", all: "one", one: "off" }[this.repeatMode],
          );
        }

        static rangeSeek_oninput() {
          const container = document.getElementById("container"),
            rangeSeek = document.getElementById("rangeSeek");

          container.currentTime = parseFloat(rangeSeek.value);
        }

        static btnJumpBck_onclick() {
          const container = document.getElementById("container");

          container.currentTime -= 10;
        }

        static btnJumpFwd_onclick() {
          const container = document.getElementById("container");

          container.currentTime += 10;
        }

        static container_onloadedmetadata() {
          const container = document.getElementById("container"),
            rangeSeek = document.getElementById("rangeSeek"),
            spanTimeDuration = document.getElementById("spanTimeDuration");

          rangeSeek.max = container.duration;
          spanTimeDuration.textContent = formatDuration(container.duration);
        }

        static container_ontimeupdate() {
          const container = document.getElementById("container"),
            rangeSeek = document.getElementById("rangeSeek"),
            spanTimeCurrent = document.getElementById("spanTimeCurrent");

          rangeSeek.value = container.currentTime;
          spanTimeCurrent.textContent = formatDuration(container.currentTime);
        }

        static container_onended() {
          const container = document.getElementById("container"),
            btnNext = document.getElementById("btnNext");

          if (this.repeatMode === "one") {
            this.showModalMsg("Starting playback...");
            container.play().then(() => this.showModalMsg());
          } else btnNext.click();
        }

        static container_onplay() {
          this.updatePlaybackStatus();
        }

        static container_onpause() {
          this.updatePlaybackStatus();
        }
      }
    </script>
  </head>

  <body
    onload="App.body_onload()"
    onhashchange="window.location.reload()"
    onkeydown="App.body_onkeydown(event)"
  >
    <audio
      hidden
      id="container"
      onloadedmetadata="App.container_onloadedmetadata()"
      ontimeupdate="App.container_ontimeupdate()"
      onended="App.container_onended()"
      onplay="App.container_onplay()"
      onpause="App.container_onpause()"
    >
      <source />
      Your browser does not support the HTML5 audio element
    </audio>

    <div id="divUpperOut">
      <div id="divUpperIn">
        <h1 id="titleMain">Audio playlist player</h1>

        <table id="tblList">
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="divLowerOut">
      <div id="divLowerIn">
        <div id="divLower1">
          <span
            id="spanTimeCurrent"
            class="font-monospace"
            title="Current playback time"
            >00:00</span
          >

          <span
            id="btnShuffle"
            class="cursor-pointer select-none material-symbols-outlined color-grey"
            title="Shuffle"
            style="font-size: 16px"
            onclick="App.btnShuffle_onclick()"
            >shuffle</span
          >

          <span class="select-none">&nbsp;</span>

          <span
            id="btnPrev"
            class="cursor-pointer select-none material-symbols-outlined"
            title="Previous"
            style="font-size: 24px"
            onclick="App.btnPrev_onclick()"
            >skip_previous</span
          >
          <span
            id="btnPlayPause"
            class="cursor-pointer select-none material-symbols-outlined"
            title="Play"
            style="font-size: 40px"
            onclick="App.btnPlayPause_onclick()"
            >play_arrow</span
          >
          <span
            id="btnNext"
            class="cursor-pointer select-none material-symbols-outlined"
            title="Next"
            style="font-size: 24px"
            onclick="App.btnNext_onclick()"
            >skip_next</span
          >

          <span class="select-none">&nbsp;</span>

          <span
            id="btnRepeat"
            class="cursor-pointer select-none material-symbols-outlined color-grey"
            title="Repeat mode"
            style="font-size: 16px"
            onclick="App.btnRepeat_onclick()"
            >repeat</span
          >

          <span
            id="spanTimeDuration"
            class="font-monospace"
            title="Total duration"
            >--:--</span
          >
        </div>

        <div id="divLower2" class="select-none">
          <span
            id="btnJumpBck"
            class="cursor-pointer material-symbols-outlined"
            title="Jump back 10 seconds"
            style="font-size: 24px"
            onclick="App.btnJumpBck_onclick()"
            >replay_10</span
          >

          <input
            type="range"
            id="rangeSeek"
            step="0.01"
            min="0"
            max="0"
            value="0"
            class="cursor-pointer"
            style="flex: 1"
            oninput="App.rangeSeek_oninput()"
          />

          <span
            id="btnJumpFwd"
            class="cursor-pointer material-symbols-outlined"
            title="Jump forward 10 seconds"
            style="font-size: 24px"
            onclick="App.btnJumpFwd_onclick()"
            >forward_10</span
          >
        </div>
      </div>
    </div>

    <dialog id="dialogMsg" closedby="none"></dialog>
  </body>
</html>
