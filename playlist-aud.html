<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Audio playlist player</title>

    <link
      rel="stylesheet"
      type="text/css"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />

    <style type="text/css">
      body,
      td,
      th {
        font-family: sans-serif;
      }

      body {
        background-color: #222;
        color: #ccc;
      }

      .font-monospace {
        font-family: monospace;
      }
      .font-bold {
        font-weight: bold;
      }

      .cursor-default {
        cursor: default;
      }
      .cursor-pointer {
        cursor: pointer;
      }

      .color333 {
        color: #333;
      }

      .modal {
        margin: 0px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        padding: 20px;

        background-color: #111;
        color: #ccc;
      }

      #divUpperOut {
        margin: 0px;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: calc(100% - 85px);

        overflow-y: scroll;
      }
      #divUpperIn {
        margin: 10px;
      }

      #divLowerOut {
        background-color: #111;

        margin: 0px;
        position: absolute;
        left: 0px;
        bottom: 0px;
        width: 100%;
        height: 85px;
      }
      #divLowerIn {
        margin: 10px;
      }

      #divControls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      #divSeek {
        display: flex;
        align-items: center;
        gap: 10px;
      }
    </style>

    <script type="text/javascript">
      function xmlescape(x) {
        return x
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&apos;");
      }

      function formatTime(sec) {
        if (!isFinite(sec) || sec < 0) return "--:--";

        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec / 60) % 60);
        const s = Math.floor(sec % 60);

        return (
          (h > 0 ? `${h}:` : "") +
          String(m).padStart(2, "0") +
          ":" +
          String(s).padStart(2, "0")
        );
      }

      function showModal(id) {
        document
          .querySelectorAll(".modal")
          .forEach((modal) => (modal.hidden = modal.id !== id));
      }

      function showMsg(msg) {
        document.getElementById("spanMsg").textContent = msg;
        showModal("modalMsg");
      }

      function parseHash(hash = "") {
        if (hash === "") hash = window.location.hash;
        if (hash.startsWith("#")) hash = hash.substring(1);

        const index = hash.indexOf("?");
        let [path, query] = [hash, ""];
        if (index >= 0)
          [path, query] = [hash.substring(0, index), hash.substring(index + 1)];

        const cfg = Object.fromEntries(new URLSearchParams(query).entries());

        cfg.item = parseInt(cfg.item ?? "-1", 10);

        return [path, cfg];
      }

      let shuffleEnabled = false;
      let repeatMode = "off"; // Possible values: "off", "all", "one"

      let currentItem = null;

      function loadMediaFromHash() {
        const [path, cfg] = parseHash();

        (async () => {
          const container = document.getElementById("container");
          const source = container.children[0];

          currentItem = null;

          source.src = "";
          container.load();

          showMsg("Loading playlist...");

          const response = await fetch(path);
          if (!response.ok) throw new Error("HTTP error " + response.status);
          const responseText = await response.text();
          const lines = responseText.split(/\r?\n/u);

          const tblList = document.getElementById("tblList");

          let tableHTML = "";
          let itemTitle = "";
          let itemIndex = 0;
          for (const line of lines) {
            if (line === "") continue;

            if (line.startsWith("#")) {
              if (line.startsWith("#EXTINF:")) itemTitle = line.split(",")[1];

              continue;
            }

            tableHTML += `
              <tr class="cursor-pointer" title="${xmlescape(itemTitle)}"
                data-index="${itemIndex++}" data-url="${xmlescape(line)}"
                onclick="trItem_onclick(this)">
                <td>
                  <span class="material-symbols-outlined">music_note</span>
                </td>
                <td>${xmlescape(itemTitle)}</td>
              </tr>
            `;
          }

          document.getElementById("tblList").innerHTML = tableHTML;

          if (cfg.item >= 0) {
            if (cfg.item >= tblList.rows.length)
              throw new Error("Invalid item index " + cfg.item);

            tblList.rows[cfg.item].click();
          }

          showModal("");
        })().catch((error) => {
          console.error(error);
          showMsg(error);
        });
      }

      function trItem_onclick(elem) {
        const container = document.getElementById("container");
        const source = container.children[0];
        const tblList = document.getElementById("tblList");

        currentItem = elem;

        source.src = elem.dataset.url;
        container.load();

        for (const row of tblList.rows)
          if (row === elem) row.classList.add("font-bold");
          else row.classList.remove("font-bold");

        // Warning: the following may fail if the user didn't interact with
        // the document first
        container.play();
      }

      function btnShuffle_onclick() {
        const btnShuffle = document.getElementById("btnShuffle");

        shuffleEnabled = !shuffleEnabled;

        btnShuffle.classList.toggle("color333", !shuffleEnabled);
      }

      function btnPrevious_onclick() {
        const container = document.getElementById("container");
        const source = container.children[0];
        const tblList = document.getElementById("tblList");

        if (tblList.rows.length === 0) return;

        if (shuffleEnabled) {
          tblList.rows[Math.floor(Math.random() * tblList.rows.length)].click();
          return;
        }

        if (currentItem === null) {
          tblList.rows[0].click();
          return;
        }

        const prevIndex =
          (parseInt(currentItem.dataset.index, 10) + tblList.rows.length - 1) %
          tblList.rows.length;

        tblList.rows[prevIndex].click();
      }

      function btnPlayPause_onclick() {
        const container = document.getElementById("container");

        if (container.paused) container.play();
        else container.pause();
      }

      function btnNext_onclick() {
        const container = document.getElementById("container");
        const source = container.children[0];
        const tblList = document.getElementById("tblList");

        if (tblList.rows.length === 0) return;

        if (shuffleEnabled) {
          tblList.rows[Math.floor(Math.random() * tblList.rows.length)].click();
          return;
        }

        if (currentItem === null) {
          tblList.rows[0].click();
          return;
        }

        const nextIndex =
          (parseInt(currentItem.dataset.index, 10) + 1) % tblList.rows.length;

        if (nextIndex === 0 && repeatMode === "off") {
          source.src = "";
          container.load();
          return;
        }

        tblList.rows[nextIndex].click();
      }

      function btnRepeat_onclick() {
        const btnRepeat = document.getElementById("btnRepeat");

        switch (repeatMode) {
          case "off":
            repeatMode = "all";
            btnRepeat.textContent = "repeat";
            btnRepeat.classList.remove("color333");
            break;
          case "all":
            repeatMode = "one";
            btnRepeat.textContent = "repeat_one";
            btnRepeat.classList.remove("color333");
            break;
          case "one":
            repeatMode = "off";
            btnRepeat.textContent = "repeat";
            btnRepeat.classList.add("color333");
            break;
          default:
            throw new Error("Invalid repeat mode " + repeatMode);
        }
      }

      function rangeSeek_oninput() {
        const container = document.getElementById("container"),
          rangeSeek = document.getElementById("rangeSeek");

        container.currentTime = parseFloat(rangeSeek.value);
      }

      function container_onloadedmetadata() {
        const container = document.getElementById("container"),
          rangeSeek = document.getElementById("rangeSeek"),
          spanTimeDuration = document.getElementById("spanTimeDuration");

        rangeSeek.max = container.duration;
        spanTimeDuration.textContent = formatTime(container.duration);
      }

      function container_ontimeupdate() {
        const container = document.getElementById("container"),
          rangeSeek = document.getElementById("rangeSeek"),
          spanTimeCurrent = document.getElementById("spanTimeCurrent");

        rangeSeek.value = container.currentTime;
        spanTimeCurrent.textContent = formatTime(container.currentTime);
      }

      function container_onended() {
        const container = document.getElementById("container"),
          btnNext = document.getElementById("btnNext");

        if (repeatMode === "one") container.play();
        else btnNext.click();
      }

      function container_onplay() {
        const btnPlayPause = document.getElementById("btnPlayPause");

        btnPlayPause.textContent = "pause";
        btnPlayPause.title = "Pause";
      }

      function container_onpause() {
        const btnPlayPause = document.getElementById("btnPlayPause");

        btnPlayPause.textContent = "play_arrow";
        btnPlayPause.title = "Play";
      }
    </script>
  </head>

  <body onload="loadMediaFromHash()" onhashchange="loadMediaFromHash()">
    <audio
      hidden
      id="container"
      ontimeupdate="container_ontimeupdate()"
      onloadedmetadata="container_onloadedmetadata()"
      onended="container_onended()"
      onplay="container_onplay()"
      onpause="container_onpause()"
    >
      <source />
      Your browser does not support the HTML5 audio element
    </audio>

    <div id="divUpperOut">
      <div id="divUpperIn">
        <table id="tblList"></table>
      </div>
    </div>

    <div id="divLowerOut">
      <div id="divLowerIn">
        <div id="divControls">
          <span
            id="btnShuffle"
            class="cursor-pointer material-symbols-outlined color333"
            title="Shuffle"
            style="font-size: 16px"
            onclick="btnShuffle_onclick()"
            >shuffle</span
          >

          &nbsp;

          <span
            id="btnPrevious"
            class="cursor-pointer material-symbols-outlined"
            title="Previous"
            style="font-size: 24px"
            onclick="btnPrevious_onclick()"
            >skip_previous</span
          >
          <span
            id="btnPlayPause"
            class="cursor-pointer material-symbols-outlined"
            title="Play"
            style="font-size: 40px"
            onclick="btnPlayPause_onclick()"
            >play_arrow</span
          >
          <span
            id="btnNext"
            class="cursor-pointer material-symbols-outlined"
            title="Next"
            style="font-size: 24px"
            onclick="btnNext_onclick()"
            >skip_next</span
          >

          &nbsp;

          <span
            id="btnRepeat"
            class="cursor-pointer material-symbols-outlined color333"
            title="Repeat mode"
            style="font-size: 16px"
            onclick="btnRepeat_onclick()"
            >repeat</span
          >
        </div>

        <div id="divSeek">
          <span id="spanTimeCurrent" class="font-monospace">00:00</span>
          <input
            type="range"
            id="rangeSeek"
            step="0.01"
            min="0"
            max="0"
            value="0"
            class="cursor-pointer"
            style="flex: 1"
            oninput="rangeSeek_oninput()"
          />
          <span id="spanTimeDuration" class="font-monospace">--:--</span>
        </div>
      </div>
    </div>

    <div id="modalMsg" class="modal" hidden>
      <span id="spanMsg"></span>
    </div>
  </body>
</html>
