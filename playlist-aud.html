<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Audio playlist player</title>

    <link
      rel="stylesheet"
      type="text/css"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    />

    <style type="text/css">
      :root {
        color-scheme: light dark;

        --modal-bg: #eee;
        --lower-bg: #eee;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --modal-bg: #000;
          --lower-bg: #000;
        }
      }

      body,
      td,
      th {
        font-family: sans-serif;
      }

      .font-monospace {
        font-family: monospace;
      }
      .font-bold {
        font-weight: bold;
      }

      .cursor-default {
        cursor: default;
      }
      .cursor-pointer {
        cursor: pointer;
      }

      .select-none {
        user-select: none;
      }

      .color-grey {
        color: #888;
      }

      .modal {
        margin: 0px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        padding: 20px;

        background-color: var(--modal-bg);
      }

      #divUpperOut {
        margin: 0px;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: calc(100% - 85px);

        overflow-y: scroll;
      }
      #divUpperIn {
        margin: 10px;
      }

      #divLowerOut {
        background-color: var(--lower-bg);

        margin: 0px;
        position: absolute;
        left: 0px;
        bottom: 0px;
        width: 100%;
        height: 85px;
      }
      #divLowerIn {
        margin: 10px;
      }

      #divControls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      #divSeek {
        display: flex;
        align-items: center;
        gap: 10px;
      }
    </style>

    <script type="text/javascript">
      // Src: https://github.com/dmotte/misc/tree/main/snippets
      function xmlescape(x) {
        return x
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&apos;");
      }

      // Src: https://github.com/dmotte/misc/tree/main/snippets
      function formatDuration(sec) {
        if (!isFinite(sec)) return "";

        const sign = sec < 0 ? "-" : "",
          absSec = Math.abs(sec);

        const h = Math.floor(absSec / 3600),
          m = Math.floor((absSec / 60) % 60),
          s = Math.floor(absSec % 60);

        return (
          sign +
          (h > 0 ? `${h}:` : "") +
          String(m).padStart(2, "0") +
          ":" +
          String(s).padStart(2, "0")
        );
      }

      class App {
        static showModal(id) {
          for (const modal of document.querySelectorAll(".modal"))
            modal.hidden = modal.id !== id;
        }

        static showMsg(msg) {
          document.getElementById("spanMsg").textContent = msg;
          this.showModal("modalMsg");
        }

        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          cfg.item = parseInt(cfg.item ?? "-1", 10);

          return [path, cfg];
        }

        ////////////////////////////////////////////////////////////////////////

        static playlistTitle = "";

        static shuffleEnabled = false;
        static repeatMode = "off"; // Possible values: "off", "all", "one"

        static currentItem = null;

        ////////////////////////////////////////////////////////////////////////

        static loadHash() {
          const [path, cfg] = this.parseHash();

          (async () => {
            const container = document.getElementById("container");
            const source = container.children[0];
            const tbody = document.getElementById("tblList").tBodies[0];

            this.currentItem = null;

            source.removeAttribute("src");
            container.load();

            tbody.innerHTML = "";

            if (path === "") {
              this.showModal("");
              return;
            }

            this.showMsg("Loading playlist...");

            const response = await fetch(path);
            if (!response.ok) throw new Error("HTTP error " + response.status);
            const responseText = await response.text();
            const lines = responseText.split(/\r?\n/u);

            let tbodyHTML = "";
            let itemTitle = "";
            let itemIndex = 0;
            for (const line of lines) {
              if (line === "") continue;

              if (line.startsWith("#")) {
                if (line.startsWith("#EXTINF:")) {
                  itemTitle = line.split(",").slice(1).join(",");
                  continue;
                }

                if (line.startsWith("#PLAYLIST:")) {
                  this.playlistTitle = line.substring(10);

                  document.title = this.playlistTitle;
                  document.getElementById("titleMain").textContent =
                    this.playlistTitle;

                  continue;
                }

                continue;
              }

              tbodyHTML += `
                <tr class="cursor-pointer" title="${xmlescape(itemTitle)}"
                  data-index="${itemIndex++}" data-url="${xmlescape(line)}"
                  onclick="App.trItem_onclick(this)">
                  <td>
                    <span class="material-symbols-outlined">music_note</span>
                  </td>
                  <td>${xmlescape(itemTitle)}</td>
                </tr>
              `;
            }

            tbody.innerHTML = tbodyHTML;

            if (cfg.item >= 0) {
              if (cfg.item >= tbody.rows.length)
                throw new Error("Invalid item index " + cfg.item);

              tbody.rows[cfg.item].click();
            }

            this.showModal("");
          })().catch((error) => {
            console.error(error);
            this.showMsg(error);
          });
        }

        ////////////////////////////////////////////////////////////////////////

        static trItem_onclick(elem) {
          const container = document.getElementById("container");
          const source = container.children[0];
          const tbody = document.getElementById("tblList").tBodies[0];

          this.currentItem = elem;

          source.src = elem.dataset.url;
          container.load();

          document.title = elem.title;

          for (const row of tbody.rows)
            row.classList.toggle("font-bold", row === elem);

          // Warning: the following may fail if the user didn't interact with
          // the document first
          container.play();
        }

        static btnShuffle_onclick() {
          const btnShuffle = document.getElementById("btnShuffle");

          this.shuffleEnabled = !this.shuffleEnabled;

          btnShuffle.classList.toggle("color-grey", !this.shuffleEnabled);
        }

        static btnPrevious_onclick() {
          const container = document.getElementById("container");
          const tbody = document.getElementById("tblList").tBodies[0];

          if (tbody.rows.length === 0) return;

          if (this.shuffleEnabled) {
            tbody.rows[Math.floor(Math.random() * tbody.rows.length)].click();
            return;
          }

          if (this.currentItem === null) {
            tbody.rows[0].click();
            return;
          }

          const prevIndex =
            (parseInt(this.currentItem.dataset.index, 10) +
              tbody.rows.length -
              1) %
            tbody.rows.length;

          tbody.rows[prevIndex].click();
        }

        static btnPlayPause_onclick() {
          const container = document.getElementById("container");

          if (container.paused) container.play();
          else container.pause();
        }

        static btnNext_onclick() {
          const container = document.getElementById("container");
          const source = container.children[0];
          const tbody = document.getElementById("tblList").tBodies[0];

          if (tbody.rows.length === 0) return;

          if (this.shuffleEnabled) {
            tbody.rows[Math.floor(Math.random() * tbody.rows.length)].click();
            return;
          }

          if (this.currentItem === null) {
            tbody.rows[0].click();
            return;
          }

          const nextIndex =
            (parseInt(this.currentItem.dataset.index, 10) + 1) %
            tbody.rows.length;

          if (nextIndex === 0 && this.repeatMode === "off") {
            source.removeAttribute("src");
            container.load();
            return;
          }

          tbody.rows[nextIndex].click();
        }

        static btnRepeat_onclick() {
          const btnRepeat = document.getElementById("btnRepeat");

          switch (this.repeatMode) {
            case "off":
              this.repeatMode = "all";
              btnRepeat.textContent = "repeat";
              btnRepeat.classList.remove("color-grey");
              break;
            case "all":
              this.repeatMode = "one";
              btnRepeat.textContent = "repeat_one";
              btnRepeat.classList.remove("color-grey");
              break;
            case "one":
              this.repeatMode = "off";
              btnRepeat.textContent = "repeat";
              btnRepeat.classList.add("color-grey");
              break;
            default:
              throw new Error("Invalid repeat mode " + this.repeatMode);
          }
        }

        static rangeSeek_oninput() {
          const container = document.getElementById("container"),
            rangeSeek = document.getElementById("rangeSeek");

          container.currentTime = parseFloat(rangeSeek.value);
        }

        static container_onloadedmetadata() {
          const container = document.getElementById("container"),
            rangeSeek = document.getElementById("rangeSeek"),
            spanTimeDuration = document.getElementById("spanTimeDuration");

          rangeSeek.max = container.duration;
          spanTimeDuration.textContent = formatDuration(container.duration);
        }

        static container_ontimeupdate() {
          const container = document.getElementById("container"),
            rangeSeek = document.getElementById("rangeSeek"),
            spanTimeCurrent = document.getElementById("spanTimeCurrent");

          rangeSeek.value = container.currentTime;
          spanTimeCurrent.textContent = formatDuration(container.currentTime);
        }

        static container_onended() {
          const container = document.getElementById("container"),
            btnNext = document.getElementById("btnNext");

          if (this.repeatMode === "one") container.play();
          else btnNext.click();
        }

        static container_onplay() {
          const btnPlayPause = document.getElementById("btnPlayPause");

          btnPlayPause.textContent = "pause";
          btnPlayPause.title = "Pause";
        }

        static container_onpause() {
          const btnPlayPause = document.getElementById("btnPlayPause");

          btnPlayPause.textContent = "play_arrow";
          btnPlayPause.title = "Play";
        }
      }
    </script>
  </head>

  <body onload="App.loadHash()" onhashchange="App.loadHash()">
    <audio
      hidden
      id="container"
      ontimeupdate="App.container_ontimeupdate()"
      onloadedmetadata="App.container_onloadedmetadata()"
      onended="App.container_onended()"
      onplay="App.container_onplay()"
      onpause="App.container_onpause()"
    >
      <source />
      Your browser does not support the HTML5 audio element
    </audio>

    <div id="divUpperOut">
      <div id="divUpperIn">
        <h1 id="titleMain">Audio playlist player</h1>

        <table id="tblList">
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="divLowerOut">
      <div id="divLowerIn">
        <div id="divControls" class="select-none">
          <span
            id="btnShuffle"
            class="cursor-pointer material-symbols-outlined color-grey"
            title="Shuffle"
            style="font-size: 16px"
            onclick="App.btnShuffle_onclick()"
            >shuffle</span
          >

          &nbsp;

          <span
            id="btnPrevious"
            class="cursor-pointer material-symbols-outlined"
            title="Previous"
            style="font-size: 24px"
            onclick="App.btnPrevious_onclick()"
            >skip_previous</span
          >
          <span
            id="btnPlayPause"
            class="cursor-pointer material-symbols-outlined"
            title="Play"
            style="font-size: 40px"
            onclick="App.btnPlayPause_onclick()"
            >play_arrow</span
          >
          <span
            id="btnNext"
            class="cursor-pointer material-symbols-outlined"
            title="Next"
            style="font-size: 24px"
            onclick="App.btnNext_onclick()"
            >skip_next</span
          >

          &nbsp;

          <span
            id="btnRepeat"
            class="cursor-pointer material-symbols-outlined color-grey"
            title="Repeat mode"
            style="font-size: 16px"
            onclick="App.btnRepeat_onclick()"
            >repeat</span
          >
        </div>

        <div id="divSeek">
          <span id="spanTimeCurrent" class="font-monospace">00:00</span>
          <input
            type="range"
            id="rangeSeek"
            step="0.01"
            min="0"
            max="0"
            value="0"
            class="cursor-pointer"
            style="flex: 1"
            oninput="App.rangeSeek_oninput()"
          />
          <span id="spanTimeDuration" class="font-monospace">--:--</span>
        </div>
      </div>
    </div>

    <div id="modalMsg" class="modal" hidden>
      <span id="spanMsg"></span>
    </div>
  </body>
</html>
