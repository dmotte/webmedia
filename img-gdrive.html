<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <title>Image viewer</title>

    <style type="text/css">
      :root {
        color-scheme: light dark;
      }

      body,
      td,
      th {
        font-family: sans-serif;
      }

      #container {
        margin: 0px;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center center;
      }
    </style>

    <script type="text/javascript">
      class App {
        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          return [path, cfg];
        }

        static loadHash() {
          const [id, cfg] = this.parseHash();

          const container = document.getElementById("container");

          if (id === "") container.style.backgroundImage = "";
          else
            container.style.backgroundImage =
              "url(https://drive.google.com/uc?id=" + id + ")";
        }
      }
    </script>
  </head>

  <body onload="App.loadHash()" onhashchange="App.loadHash()">
    <div id="container"></div>
  </body>
</html>
