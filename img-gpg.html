<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Image viewer</title>

    <style type="text/css">
      body,
      td,
      th {
        font-family: sans-serif;
      }

      input {
        background-color: #222;
        color: #ccc;
        border: 1px solid #888;
        padding: 10px;
        font-size: 16px;
      }

      #container {
        margin: 0px;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: 100%;
        background-color: #000;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center center;
      }

      .modal {
        margin: 0px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        padding: 20px;

        background-color: #222;
        color: #ccc;
      }

      #modalPsw {
        width: 50%;
      }
      #pswMain {
        width: calc(100% - 55px);
        box-sizing: border-box;
      }
      #btnLoad {
        width: 50px;
        box-sizing: border-box;
        font-weight: bold;
      }
    </style>

    <script
      type="text/javascript"
      src="https://unpkg.com/openpgp@6.3.0/dist/openpgp.min.js"
      integrity="sha384-Z5tStPoeClmuLPd1gAwdTCU53WcAkUjBNw7mEEvrQumVuNqEl52A9Nx5IhFdKE/c"
      crossorigin="anonymous"
    ></script>

    <script type="text/javascript">
      class App {
        static showModal(id) {
          document
            .querySelectorAll(".modal")
            .forEach((modal) => (modal.hidden = modal.id !== id));
        }

        static showMsg(msg) {
          document.getElementById("spanMsg").textContent = msg;
          this.showModal("modalMsg");
        }

        static parseHash(hash = "") {
          if (hash === "") hash = window.location.hash;
          if (hash.startsWith("#")) hash = hash.substring(1);

          const index = hash.indexOf("?");
          let [path, query] = [hash, ""];
          if (index >= 0)
            [path, query] = [
              hash.substring(0, index),
              hash.substring(index + 1),
            ];

          const cfg = Object.fromEntries(new URLSearchParams(query).entries());

          return [path, cfg];
        }

        static loadHash() {
          const [path, cfg] = this.parseHash();

          const pswMain = document.getElementById("pswMain");

          const psw = pswMain.value;

          if (psw === "") {
            this.showModal("modalPsw");
            pswMain.focus();
            return;
          }

          (async () => {
            const container = document.getElementById("container");

            const oldURL = container.style.backgroundImage
              .slice(4, -1)
              .replace(/^["']|["']$/gu, "");
            container.style.backgroundImage = "";
            if (oldURL) URL.revokeObjectURL(oldURL);

            if (path === "") {
              this.showModal("");
              return;
            }

            this.showMsg("Downloading media...");

            const response = await fetch(path);
            if (!response.ok) throw new Error("HTTP error " + response.status);

            this.showMsg("Decrypting media...");

            const encryptedMessage = await openpgp.readMessage({
              binaryMessage: response.body,
            });

            const { data: decrypted } = await openpgp.decrypt({
              message: encryptedMessage,
              passwords: [psw],
              format: "binary",
            });

            const chunks = [],
              reader = decrypted.getReader();
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
            }

            const blob = new Blob(chunks, { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);

            container.style.backgroundImage = "url(" + url + ")";

            this.showModal("");
          })().catch((error) => {
            console.error(error);
            this.showMsg(error);
          });
        }
      }
    </script>
  </head>

  <body onload="App.loadHash()" onhashchange="App.loadHash()">
    <div id="container" oncontextmenu="return false;"></div>

    <div id="modalMsg" class="modal" hidden>
      <span id="spanMsg"></span>
    </div>

    <div id="modalPsw" class="modal" hidden>
      <input
        type="password"
        id="pswMain"
        placeholder="Password"
        onkeypress="if (event.key === 'Enter') btnLoad.click();"
      />
      <input type="button" id="btnLoad" value="OK" onclick="App.loadHash()" />
    </div>
  </body>
</html>
